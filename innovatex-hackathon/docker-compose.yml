# Phase 2 (Path B): Supabase managed PostgreSQL — no local DB service needed.
# Backend connects to Supabase PostgreSQL via pooler (DATABASE_URL / DATABASE_URL_POOLER).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagnostico-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    entrypoint: ["./entrypoint.sh"]
    command: []  # overridden by entrypoint; kept for docker-compose compatibility
    volumes:
      - ./backend:/app
      - /app/.venv  # anonymous volume — preserva el venv entre reinicios
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Frontend runs locally: cd frontend && npm install && npm run dev
# Nginx not needed for local dev (no postgres service to proxy)
